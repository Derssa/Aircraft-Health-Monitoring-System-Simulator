  sensor-simulator:
    build:
      context: .
      dockerfile: sensor-simulator/Dockerfile
    container_name: sensor-simulator
    restart: unless-stopped
    # depends_on:
    #   - kafka
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_CA_PATH=${KAFKA_CA_PATH}
      - KAFKA_CERT_PATH=${KAFKA_CERT_PATH}
      - KAFKA_KEY_PATH=${KAFKA_KEY_PATH}

  telemetry-ingestion-service:
    build:
      context: .
      dockerfile: telemetry-ingestion-service/Dockerfile
    container_name: telemetry-ingestion-service
    restart: unless-stopped
    # depends_on:
      # postgres:
      #   condition: service_healthy
      # kafka:
      #   condition: service_started
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_CA_PATH=${KAFKA_CA_PATH}
      - KAFKA_CERT_PATH=${KAFKA_CERT_PATH}
      - KAFKA_KEY_PATH=${KAFKA_KEY_PATH}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

  validation-service:
    build:
      context: .
      dockerfile: validation-service/Dockerfile
    container_name: validation-service
    restart: unless-stopped
    # depends_on:
      # postgres:
      #   condition: service_healthy
      # kafka:
      #   condition: service_started
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_CA_PATH=${KAFKA_CA_PATH}
      - KAFKA_CERT_PATH=${KAFKA_CERT_PATH}
      - KAFKA_KEY_PATH=${KAFKA_KEY_PATH}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    # depends_on:
      # postgres:
      #   condition: service_healthy
    # Internal communication only
    # ports:
    #   - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_CA_PATH=${KAFKA_CA_PATH}
      - KAFKA_CERT_PATH=${KAFKA_CERT_PATH}
      - KAFKA_KEY_PATH=${KAFKA_KEY_PATH}

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    # Remove direct port exposure
    # ports:
    #   - "5173:5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - api-gateway

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - dashboard

